{% extends "base.html" %}

{% block content %}
<h2>Recent Builds</h2>
<form id="build-filters" method="get" action="{{ url_for('index') }}" class="filters">
    <label>
        Project
        <select name="project">
            <option value="">All</option>
            {% for project_option in filter_options.project %}
            <option value="{{ project_option }}" {% if filters.project == project_option %}selected{% endif %}>
                {{ project_option }}
            </option>
            {% endfor %}
        </select>
    </label>
    <label>
        Status
        <select name="status">
            <option value="">All</option>
            {% for status_option in filter_options.status %}
            <option value="{{ status_option }}" {% if filters.status == status_option %}selected{% endif %}>
                {{ status_option }}
            </option>
            {% endfor %}
        </select>
    </label>
    <label>
        Branch
        <select name="branch">
            <option value="">All</option>
            {% for branch_option in filter_options.branch %}
            <option value="{{ branch_option }}" {% if filters.branch == branch_option %}selected{% endif %}>
                {{ branch_option }}
            </option>
            {% endfor %}
        </select>
    </label>
    <label>
        Workflow
        <input type="text" name="workflow" value="{{ filters.workflow }}" placeholder="build.yml">
    </label>
    <button type="submit">Apply</button>
    <a href="{{ url_for('index') }}">Reset</a>
</form>

<section
    id="summary-container"
    hx-get="{{ url_for('index_summary_partial') }}"
    hx-trigger="every 20s"
    hx-include="#build-filters"
    hx-swap="innerHTML">
    {% include "partials/index_summary.html" %}
</section>

<section
    id="table-container"
    hx-get="{{ url_for('index_table_partial') }}"
    hx-trigger="every 20s"
    hx-include="#build-filters"
    hx-swap="innerHTML">
    {% include "partials/index_table.html" %}
</section>
{% endblock %}

{% block extra_scripts %}
<script>
    (function () {
        let trendChart = null;

        function renderTrendChart() {
            const canvas = document.getElementById("build-duration-trend");
            if (!canvas || !window.Chart) return;
            const labels = JSON.parse(canvas.dataset.labels || "[]");
            const values = JSON.parse(canvas.dataset.values || "[]");
            const failedValues = JSON.parse(canvas.dataset.failedValues || "[]");

            if (trendChart) {
                trendChart.destroy();
            }

            Chart.defaults.color = "#8b949e";
            Chart.defaults.borderColor = "#30363d";

            trendChart = new Chart(canvas, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: "line",
                            label: "Avg job duration (s)",
                            data: values,
                            borderColor: "#58a6ff",
                            backgroundColor: "rgba(88,166,255,0.1)",
                            yAxisID: "y"
                        },
                        {
                            type: "bar",
                            label: "Failed jobs",
                            data: failedValues,
                            backgroundColor: "rgba(248,81,73,0.25)",
                            borderColor: "#f85149",
                            yAxisID: "y1"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    plugins: { legend: { position: "bottom", labels: { color: "#8b949e" } } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: "#8b949e" }, grid: { color: "#21262d" }, title: { display: true, text: "Seconds", color: "#8b949e" } },
                        y1: { beginAtZero: true, position: "right", ticks: { color: "#8b949e" }, grid: { drawOnChartArea: false, color: "#21262d" }, title: { display: true, text: "Failures", color: "#8b949e" } }
                    }
                }
            });
        }

        document.addEventListener("DOMContentLoaded", renderTrendChart);
        document.body.addEventListener("htmx:afterSwap", function (event) {
            if (event.target && event.target.id === "summary-container") {
                renderTrendChart();
            }
        });
    })();
</script>
{% endblock %}
