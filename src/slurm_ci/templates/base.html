<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slurm CI Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-datatables@9.1.0/dist/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@9.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        /* ============================================================
           GitHub Actions Dark Theme (Primer dark palette)
           ============================================================ */
        :root {
            --gh-bg-canvas:    #0d1117;
            --gh-bg-default:   #161b22;
            --gh-bg-subtle:    #21262d;
            --gh-bg-inset:     #010409;
            --gh-border:       #30363d;
            --gh-border-muted: #21262d;
            --gh-fg-default:   #c9d1d9;
            --gh-fg-muted:     #8b949e;
            --gh-fg-emphasis:  #f0f6fc;
            --gh-accent:       #58a6ff;
            --gh-accent-hover: #79c0ff;
            --gh-success:      #3fb950;
            --gh-danger:       #f85149;
            --gh-warning:      #d29922;
            --gh-info:         #58a6ff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--gh-fg-default);
            background-color: var(--gh-bg-canvas);
        }

        a { color: var(--gh-accent); text-decoration: none; }
        a:hover { color: var(--gh-accent-hover); text-decoration: underline; }

        h1, h2, h3 {
            color: var(--gh-fg-emphasis);
            font-weight: 600;
            margin-top: 0;
        }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.15rem; border-bottom: 1px solid var(--gh-border); padding-bottom: 0.4rem; }
        h3 { font-size: 1rem; }

        p { margin: 0.4rem 0; }
        small { color: var(--gh-fg-muted); }

        /* --- Page shell --- */
        header {
            background-color: var(--gh-bg-default);
            border-bottom: 1px solid var(--gh-border);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }
        header nav { display: flex; gap: 1rem; }
        header nav a {
            color: var(--gh-fg-default);
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
        }
        header nav a:hover {
            background-color: var(--gh-bg-subtle);
            text-decoration: none;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1.5rem;
            max-width: 100%;
            overflow-x: hidden;
        }

        footer {
            border-top: 1px solid var(--gh-border);
            padding: 1rem 1.5rem;
            text-align: center;
            color: var(--gh-fg-muted);
            font-size: 0.8rem;
        }

        /* --- Tables --- */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 0.5rem 0.6rem;
            text-align: left;
            border-bottom: 1px solid var(--gh-border-muted);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            color: var(--gh-fg-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        tr:hover td {
            background-color: var(--gh-bg-default);
        }

        .centered-table {
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
        }

        .dataTable-wrapper {
            display: block;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            box-sizing: border-box;
        }

        .dataTable-container {
            overflow-x: auto;
            width: 100%;
            max-width: 100%;
        }

        .dataTable-top,
        .dataTable-bottom {
            width: 100%;
            max-width: 100%;
            color: var(--gh-fg-muted);
        }

        .dataTable-top select,
        .dataTable-top input,
        .dataTable-bottom select {
            background-color: var(--gh-bg-default);
            color: var(--gh-fg-default);
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
        }

        .dataTable-table {
            width: 100%;
            max-width: 100%;
            table-layout: fixed;
        }

        .dataTable-pagination li a,
        .dataTable-pagination li button {
            color: var(--gh-accent);
        }
        .dataTable-pagination li.active a {
            background-color: var(--gh-accent);
            color: var(--gh-bg-canvas);
            border-radius: 6px;
        }

        /* --- Status dots --- */
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .status-dot.completed, .status-dot.success { background-color: var(--gh-success); }
        .status-dot.failed, .status-dot.error      { background-color: var(--gh-danger); }
        .status-dot.running                         { background-color: var(--gh-info); }
        .status-dot.pending                         { background-color: var(--gh-warning); }
        .status-dot.incomplete                      { background-color: #a371f7; }

        .status-completed, .status-success { color: var(--gh-success); font-weight: 600; }
        .status-failed, .status-error      { color: var(--gh-danger);  font-weight: 600; }
        .status-running                    { color: var(--gh-info);    font-weight: 600; }
        .status-pending                    { color: var(--gh-warning); font-weight: 600; }
        .status-incomplete                 { color: #a371f7;           font-weight: 600; }

        /* --- Compact cell helpers --- */
        .cell-main {
            font-weight: 600;
            display: flex;
            align-items: center;
            color: var(--gh-fg-emphasis);
        }

        .cell-sub {
            font-size: 0.82em;
            color: var(--gh-fg-muted);
            margin-top: 1px;
        }

        .cell-sub code {
            font-size: 0.95em;
            background: var(--gh-bg-subtle);
            color: var(--gh-fg-default);
            padding: 0 4px;
            border-radius: 3px;
        }

        .matrix-tag {
            display: inline-block;
            padding: 1px 6px;
            margin: 1px 2px;
            border-radius: 12px;
            font-size: 0.78em;
            background-color: var(--gh-bg-subtle);
            border: 1px solid var(--gh-border);
            color: var(--gh-fg-default);
            white-space: nowrap;
        }

        .job-count {
            display: inline-block;
            padding: 2px 6px;
            margin: 1px;
            border-radius: 12px;
            font-size: 0.82em;
            background-color: var(--gh-bg-subtle);
            border: 1px solid var(--gh-border);
        }

        /* --- Build info --- */
        .build-info {
            background-color: var(--gh-bg-default);
            border: 1px solid var(--gh-border);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }
        .build-info strong { color: var(--gh-fg-muted); }

        /* --- Code --- */
        code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.88em;
        }

        pre {
            background-color: var(--gh-bg-default);
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 0.75rem;
            overflow-x: auto;
            color: var(--gh-fg-default);
        }

        /* --- Details/summary --- */
        details summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--gh-accent);
        }
        details[open] summary { margin-bottom: 0.5rem; }

        /* --- Buttons --- */
        .btn {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            color: var(--gh-fg-default);
            background-color: var(--gh-bg-subtle);
            white-space: nowrap;
        }
        .btn:hover {
            background-color: var(--gh-border);
            text-decoration: none;
            color: var(--gh-fg-emphasis);
        }

        .btn-sm {
            padding: 0.15rem 0.4rem;
            font-size: 0.75rem;
        }

        .btn-primary {
            background-color: #238636;
            border-color: rgba(240,246,252,0.1);
            color: #fff;
        }
        .btn-primary:hover {
            background-color: #2ea043;
            color: #fff;
        }

        [title] {
            cursor: help;
            text-decoration: underline dotted;
        }

        .status-container {
            display: flex;
            align-items: center;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-left: 6px;
            color: var(--gh-fg-muted);
            display: inline-flex;
            align-items: center;
        }
        .copy-btn:hover { color: var(--gh-accent); }

        /* --- Meta / filters / summary --- */
        .meta-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .source-pill {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 12px;
            font-size: 0.78rem;
            border: 1px solid var(--gh-border);
            background-color: var(--gh-bg-subtle);
            color: var(--gh-fg-muted);
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: end;
            margin: 0.75rem 0 1rem 0;
        }
        .filters label {
            display: grid;
            gap: 0.2rem;
            color: var(--gh-fg-muted);
            font-size: 0.82rem;
        }
        .filters select,
        .filters input[type="text"] {
            background-color: var(--gh-bg-default);
            color: var(--gh-fg-default);
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            font-size: 0.85rem;
        }
        .filters button {
            background-color: var(--gh-bg-subtle);
            color: var(--gh-fg-default);
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 0.35rem 0.7rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .filters button:hover { background-color: var(--gh-border); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .summary-card {
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 0.7rem 0.8rem;
            background: var(--gh-bg-default);
        }
        .summary-label {
            font-size: 0.78rem;
            color: var(--gh-fg-muted);
            margin-bottom: 0.2rem;
        }
        .summary-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gh-fg-emphasis);
        }
        .summary-sub {
            font-size: 0.72rem;
            color: var(--gh-fg-muted);
            margin-top: 0.15rem;
        }

        .kpi-grid {
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            margin-top: 0.25rem;
        }

        /* --- Chart card --- */
        .chart-card {
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            background: var(--gh-bg-default);
            padding: 0.75rem 0.9rem;
            margin: 0 0 1rem 0;
        }
        .chart-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }
        .chart-header h3 {
            margin: 0;
            font-size: 0.95rem;
            color: var(--gh-fg-emphasis);
        }
        .chart-canvas-wrap {
            position: relative;
            height: 220px;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
                style="height: 1.2em; vertical-align: middle; margin-right: 0.5em;">
            Slurm CI
        </h1>
        <nav>
            <a href="{{ url_for('index') }}">Builds</a>
            <a href="{{ url_for('all_logs') }}">Logs</a>
        </nav>
    </header>
    <main>
        {% if data_source %}
        <div class="meta-row">
            <span class="source-pill">{{ data_source }}</span>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Slurm CI</p>
    </footer>
    <script>
        (function () {
            const dtInstances = new Map();

            function initDataTables(root) {
                if (!window.simpleDatatables) return;
                const scope = root || document;
                const tables = scope.querySelectorAll('table[data-datatable="true"]');
                tables.forEach((table) => {
                    const key = table.id || table;
                    if (dtInstances.has(key)) {
                        dtInstances.get(key).destroy();
                        dtInstances.delete(key);
                    }
                    const opts = {
                        perPage: Number(table.dataset.perPage || 25),
                        perPageSelect: [10, 25, 50, 100],
                        searchable: table.dataset.searchable !== "false",
                        fixedHeight: false
                    };
                    if (table.dataset.sortColumn) {
                        opts.columns = [{
                            select: Number(table.dataset.sortColumn),
                            sort: table.dataset.sortDir || "desc"
                        }];
                    }
                    const instance = new simpleDatatables.DataTable(table, opts);
                    dtInstances.set(key, instance);
                });
            }

            document.addEventListener("DOMContentLoaded", function () {
                initDataTables(document);
            });

            document.body.addEventListener("htmx:afterSwap", function (event) {
                initDataTables(event.target);
            });
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
