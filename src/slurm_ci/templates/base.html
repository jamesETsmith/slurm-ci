<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slurm CI Dashboard</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-datatables@9.1.0/dist/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@9.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        /* --- Layout containment --- */
        main {
            max-width: 100%;
            overflow-x: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 0.5rem 0.6rem;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .centered-table {
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .dataTable-wrapper {
            display: block;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            box-sizing: border-box;
        }

        .dataTable-container {
            overflow-x: auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .dataTable-top,
        .dataTable-bottom {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .dataTable-table {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            table-layout: fixed;
        }

        /* --- Status dots (GitHub Actions style) --- */
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .status-dot.completed, .status-dot.success { background-color: #28a745; }
        .status-dot.failed, .status-dot.error      { background-color: #dc3545; }
        .status-dot.running                         { background-color: #007bff; }
        .status-dot.pending                         { background-color: #ffc107; }

        .status-completed, .status-success { color: #28a745; font-weight: bold; }
        .status-failed, .status-error      { color: #dc3545; font-weight: bold; }
        .status-running                    { color: #007bff; font-weight: bold; }
        .status-pending                    { color: #ffc107; font-weight: bold; }

        /* --- Compact cell helpers --- */
        .cell-main {
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .cell-sub {
            font-size: 0.82em;
            color: #6c757d;
            margin-top: 1px;
        }

        .cell-sub code {
            font-size: 0.95em;
            background: #f0f0f0;
            padding: 0 3px;
            border-radius: 3px;
        }

        .matrix-tag {
            display: inline-block;
            padding: 1px 5px;
            margin: 1px 2px;
            border-radius: 3px;
            font-size: 0.78em;
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
            white-space: nowrap;
        }

        .job-count {
            display: inline-block;
            padding: 2px 6px;
            margin: 1px;
            border-radius: 3px;
            font-size: 0.85em;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
        }

        /* --- Build info --- */
        .build-info {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 2rem;
        }

        /* --- Code --- */
        code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }

        /* --- Details/summary --- */
        details summary {
            cursor: pointer;
            font-weight: bold;
        }
        details[open] summary {
            margin-bottom: 0.5rem;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-block;
            padding: 0.2rem 0.45rem;
            font-size: 0.8rem;
            font-weight: 400;
            line-height: 1.4;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 0.25rem;
            color: #fff;
            background-color: #5c95c5;
            border-color: #5c95c5;
            white-space: nowrap;
        }
        .btn:hover {
            background-color: #4a7aa4;
            border-color: #4a7aa4;
        }

        .btn-sm {
            padding: 0.15rem 0.35rem;
            font-size: 0.75rem;
        }

        [title] {
            cursor: help;
            text-decoration: underline dotted;
        }

        .status-container {
            display: flex;
            align-items: center;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-left: 6px;
            color: #5c95c5;
            display: inline-flex;
            align-items: center;
        }
        .copy-btn:hover { color: #4a7aa4; }

        /* --- Meta / filters / summary --- */
        .meta-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .source-pill {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-size: 0.8rem;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
            color: #495057;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: end;
            margin: 0.75rem 0 1rem 0;
        }
        .filters label {
            display: grid;
            gap: 0.2rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .summary-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 0.7rem 0.8rem;
            background: #fff;
        }
        .summary-label {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 0.2rem;
        }
        .summary-value {
            font-size: 1.1rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
                style="height: 1em; vertical-align: middle; margin-right: 0.5em;">
            Slurm CI Dashboard
        </h1>
        <nav>
            <a href="{{ url_for('index') }}">Builds</a>
            <a href="{{ url_for('all_logs') }}">Logs</a>
        </nav>
    </header>
    <main>
        {% if data_source %}
        <div class="meta-row">
            <span class="source-pill">Data source: {{ data_source }}</span>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Slurm CI</p>
    </footer>
    <script>
        (function () {
            const dtInstances = new Map();

            function initDataTables(root) {
                if (!window.simpleDatatables) return;
                const scope = root || document;
                const tables = scope.querySelectorAll('table[data-datatable="true"]');
                tables.forEach((table) => {
                    const key = table.id || table;
                    if (dtInstances.has(key)) {
                        dtInstances.get(key).destroy();
                        dtInstances.delete(key);
                    }
                    const instance = new simpleDatatables.DataTable(table, {
                        perPage: Number(table.dataset.perPage || 25),
                        perPageSelect: [10, 25, 50, 100],
                        searchable: table.dataset.searchable !== "false",
                        fixedHeight: false
                    });
                    dtInstances.set(key, instance);
                });
            }

            document.addEventListener("DOMContentLoaded", function () {
                initDataTables(document);
            });

            document.body.addEventListener("htmx:afterSwap", function (event) {
                initDataTables(event.target);
            });
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
