<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slurm CI Dashboard</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <style>
        /* Status indicators */
        .status-completed, .status-success { 
            color: #28a745; 
            font-weight: bold;
        }
        .status-failed, .status-error { 
            color: #dc3545; 
            font-weight: bold;
        }
        .status-running { 
            color: #007bff; 
            font-weight: bold;
        }
        .status-pending { 
            color: #ffc107; 
            font-weight: bold;
        }
        
        /* Job count badges */
        .job-count {
            display: inline-block;
            padding: 2px 6px;
            margin: 1px;
            border-radius: 3px;
            font-size: 0.85em;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        
        /* Build info styling */
        .build-info {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 2rem;
        }
        
        /* Table improvements */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        
        /* Code styling */
        code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }
        
        /* Details/summary styling */
        details summary {
            cursor: pointer;
            font-weight: bold;
        }
        
        details[open] summary {
            margin-bottom: 0.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.5;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            border: 1px solid transparent;
            border-radius: 0.25rem;
            color: #fff;
            background-color: #5c95c5;
            border-color: #5c95c5;
        }
        .btn:hover {
            background-color: #4a7aa4;
            border-color: #4a7aa4;
        }

        .sort-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #5c95c5;
        }

        .sortable-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [title] {
            cursor: help;
            text-decoration: underline dotted;
        }

        .status-container {
            display: flex;
            align-items: center;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-left: 8px;
            color: #5c95c5;
            display: inline-flex;
            align-items: center;
        }

        .copy-btn:hover {
            color: #4a7aa4;
        }
    </style>
</head>
<body>
    <header>
        <h1>Slurm CI Dashboard</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Slurm CI</p>
    </footer>
</body>
</html>
