<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slurm CI Dashboard</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <style>
        /* Status indicators */
        .status-completed, .status-success { 
            color: #28a745; 
            font-weight: bold;
        }
        .status-failed, .status-error { 
            color: #dc3545; 
            font-weight: bold;
        }
        .status-running { 
            color: #007bff; 
            font-weight: bold;
        }
        .status-pending { 
            color: #ffc107; 
            font-weight: bold;
        }
        
        /* Job count badges */
        .job-count {
            display: inline-block;
            padding: 2px 6px;
            margin: 1px;
            border-radius: 3px;
            font-size: 0.85em;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        
        /* Build info styling */
        .build-info {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 2rem;
        }
        
        /* Table improvements */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        
        /* Code styling */
        code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }
        
        /* Details/summary styling */
        details summary {
            cursor: pointer;
            font-weight: bold;
        }
        
        details[open] summary {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Slurm CI Dashboard</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Slurm CI</p>
    </footer>
</body>
</html>
