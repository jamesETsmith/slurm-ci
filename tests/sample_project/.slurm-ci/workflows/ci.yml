name: sample rocm ci
on: [push]
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rocm_version: [ "6.4.2", "6.4.3" ]
        gpu_arch: [ "gfx90a", "gfx942" ]
    container:
      image: rocm/dev-ubuntu-24.04:${{ matrix.rocm_version }}-complete
    steps:
      - name: Run tests
        run: |
          echo "Testing on ROCm version ${{ matrix.rocm_version }}"
          echo "$(/opt/rocm/bin/amdclang --version)"

      - name: ROCm 6.4.2 specific step
        if: matrix.rocm_version == '6.4.2'
        run: |
          echo "I'm running on ROCm 6.4.2 with GPU arch ${{ matrix.gpu_arch }}"

      - name: ROCm 6.4.3 specific step
        if: matrix.rocm_version == '6.4.3'
        run: |
          echo "I'm running on ROCm 6.4.3 with GPU arch ${{ matrix.gpu_arch }}"