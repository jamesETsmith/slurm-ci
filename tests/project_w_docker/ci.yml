name: test workflow for building a docker image
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu_version: [ '24.04' ]
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Test Docker access
      run: docker version
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        tags: my_image_${{ matrix.ubuntu_version }}
        load: true
        push: false
        build-args: BASE_IMAGE=ubuntu:${{ matrix.ubuntu_version }}
        file: Dockerfile
        context: .

