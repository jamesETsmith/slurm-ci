# Example git-watch configuration file
# Copy this file and modify it for your repository

[daemon]
# Unique name for this git-watch daemon instance
name = "slurm-ci-dogfood-main"

# How often to check for new commits (in seconds)
# Minimum: 60 seconds to avoid rate limiting
polling_interval = 300

[repository]
# GitHub repository URL (HTTPS or SSH)
url = "git@github.com:jamesETsmith/slurm-ci.git"

# Branch to monitor (defaults to "main")
branch = "main"

# GitHub personal access token (optional, for private repos or higher rate limits)
# You can also set this as an environment variable: GITHUB_TOKEN
# github_token = "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[slurm-ci]
workflow_file = "/home/AMD/jamesmit/apps/slurm-ci/.github/workflows/ci.yml"
working_directory = "/home/AMD/jamesmit/apps/slurm-ci"

# Custom SLURM batch options
# These will override the default options and be passed to sbatch
[slurm-ci.slurm]
gres = "gpu:gfx90a-mi210x"
cpus-per-task = 4
time = "00:10:00"
